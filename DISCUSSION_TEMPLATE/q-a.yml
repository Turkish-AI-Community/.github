name: "🙏 Q&A"
description: "Teknik bir konuda soru sorun veya yardım isteyin."
title: "[Q&A]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: "Sorunuz Nedir?"
      description: "Lütfen sorunuzu net bir şekilde açıklayın."
      placeholder: "Örn: Model eğitimi sırasında 'RuntimeError: CUDA out of memory' alıyorum..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Bağlam ve Denemeler"
      description: "Hangi kütüphaneleri kullanıyorsunuz ve sorunu çözmek için ne denediniz?"
      placeholder: "PyTorch 2.1 kullanıyorum. Batch size değerini düşürmeyi denedim ama..."
  - type: textarea
    id: logs
    attributes:
      label: "Kod ve Hata Logları"
      description: "İlgili kod parçalarını ve hata çıktılarını buraya ekleyin."
      placeholder: "```python \n # Kodunuzu buraya yazın \n ```"
  - type: checkboxes
    id: compliance
    attributes:
      label: "Pro Tip & Kurallar"
      options:
        - label: "Teknik terimlerde (Inference, Weights, Tokenizer vb.) orijinal terminolojiyi kullandım."
          required: true
        - label: "Topluluk kurallarını okudum ve bu gönderinin kurallara uygun olduğunu onaylıyorum."
          required: true
